<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css" />
    <title>Document</title>
    <script type="module" src="./app.js"></script>
  </head>
  <body>
    <h1>🌟 Welcome to the Astrology App 🌟</h1>
    <div id="inputContainer">
      <input type="date" id="birthDate" />
      <button id="showButton">Show</button>
    </div>
    <div id="resultContainer">
      <div id="sign">
        <div class="label"></div>
        <div class="result"></div>
      </div>
      <div class="row">
        <div class="row-box" id="element"></div>
        <div class="row-box" id="modality"></div>
      </div>
    </div>
    <div id="signs">
      <span>♈</span>
      <span>♉</span>
      <span>♊</span>
      <span>♋</span>
      <span>♌</span>
      <span>♍</span>
      <span>♎</span>
      <span>♏</span>
      <span>♐</span>
      <span>♑</span>
      <span>♒</span>
      <span>♓</span>
    </div>
  </body>
</html>
